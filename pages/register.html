<!doctype html>
<html lang="hr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registracija — barbershop Savonja</title>
  <meta name="description" content="Registracija na barbershop Savonja booking račun (Supabase Auth)." />
  <meta name="keywords" content="registracija, signup, barber, račun" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <meta name="author" content="Dominik Tomaško" />
  <meta property="og:title" content="Registracija — barbershop Savonja" />
  <meta property="og:description" content="Registracija na barbershop Savonja booking račun." />
  <meta property="og:image" content="https://barbershop-savonja.vercel.app/assets/logo/logo_png.png" />
  <meta property="og:url" content="https://barbershop-savonja.vercel.app/pages/register.html" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="hr_HR" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" type="image/png" href="../assets/logo/logo_png.png" />
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body data-page="register">
  <div id="site-header"></div>

  <div class="shell" id="config-banner" hidden>
    <div class="callout callout--warn stack-top">
      <p><strong>Supabase nije konfiguriran.</strong> Kopiraj <code>../js/config.example.js</code> u
        <code>../js/config.local.js</code>.</p>
    </div>
  </div>

  <main id="main-content">
    <section class="section shell" aria-labelledby="register-title">
      <div class="section__head">
        <h1 class="section__title" id="register-title">Registracija</h1>
        <p class="section__sub">Kreiraj račun za rezervacije i osobni dashboard.</p>
      </div>

      <form class="form callout" id="register-form" novalidate>
        <div class="field">
          <label for="reg-name">Ime i prezime</label>
          <input id="reg-name" name="full_name" type="text" autocomplete="name" required maxlength="120" />
        </div>
        <div class="field">
          <label for="reg-email">Email</label>
          <input id="reg-email" name="email" type="email" autocomplete="email" required maxlength="120" />
        </div>
        <div class="field">
          <label for="reg-password">Lozinka</label>
          <input id="reg-password" name="password" type="password" autocomplete="new-password" required minlength="8" />
        </div>
        <div class="field">
          <label for="reg-password2">Potvrda lozinke</label>
          <input id="reg-password2" name="password_confirm" type="password" autocomplete="new-password" required />
        </div>
        <button class="btn btn--primary" type="submit">Kreiraj račun</button>
        <p class="muted">Već imaš račun? <a href="login.html">Prijava</a></p>
      </form>
    </section>
  </main>

  <div id="site-footer"></div>
  <script type="module" src="../js/app.js"></script>
</body>

</html>
